<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Church Organs</title>
  <desc id="desc">Abstract organ pipes and console geometry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#201d25" />
      <stop offset="100%" stop-color="#453858" />
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6efe5" />
      <stop offset="100%" stop-color="#c7b7a0" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <g transform="translate(220 110)">
    <rect x="0" y="180" width="90" height="430" rx="45" fill="url(#pipe)" />
    <rect x="120" y="70" width="90" height="540" rx="45" fill="url(#pipe)" />
    <rect x="240" y="0" width="90" height="610" rx="45" fill="url(#pipe)" />
    <rect x="360" y="120" width="90" height="490" rx="45" fill="url(#pipe)" />
    <rect x="480" y="40" width="90" height="570" rx="45" fill="url(#pipe)" />
    <rect x="600" y="140" width="90" height="470" rx="45" fill="url(#pipe)" />
    <rect x="720" y="30" width="90" height="580" rx="45" fill="url(#pipe)" />
    <rect x="840" y="110" width="90" height="500" rx="45" fill="url(#pipe)" />
  </g>
  <rect x="1030" y="510" width="320" height="140" rx="24" fill="#241d2c" stroke="#f6c78c" stroke-width="8" />
  <g fill="#f6c78c">
    <rect x="1060" y="545" width="260" height="18" rx="9" />
    <rect x="1060" y="584" width="260" height="18" rx="9" />
    <rect x="1060" y="623" width="180" height="18" rx="9" />
  </g>
  <text x="220" y="96" fill="#f6c78c" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="42" letter-spacing="8">CHURCH ORGANS</text>
</svg>